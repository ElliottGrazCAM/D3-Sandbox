<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | Frankly.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link rel="stylesheet" href="../css/app.css">
    <style>
        .gradient-text {
            background: linear-gradient(90deg, var(--brand-primary), var(--brand-secondary));
            background-clip: text; 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            color: transparent; 
        }
    </style>
</head>

<body
    class="bg-slate-900 text-slate-50 font-sans antialiased flex flex-col min-h-screen items-center justify-center p-6">

    <div class="max-w-lg w-full bg-slate-950 border border-slate-800 rounded-xl p-10 text-center shadow-2xl">
        <div class="mb-6 flex justify-center">
            <svg class="w-16 h-16 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                    d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z">
                </path>
            </svg>
        </div>

        <h1 class="text-3xl font-extrabold mb-4 tracking-tight">Welcome to <span class="gradient-text">Frankly.</span>
        </h1>
        <p class="text-slate-400 mb-8 leading-relaxed">
            Your connection is secure. We are ready to pull your latest QuickBooks data and prepare your board's
            financial overview.
        </p>

        <a href="index.html"
            class="inline-block w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-md transition active:scale-[0.98] shadow-lg shadow-blue-500/20">
            Go to Dashboard
        </a>
    </div>

    <script src="js/auth.js"></script>
</body>

</html>
