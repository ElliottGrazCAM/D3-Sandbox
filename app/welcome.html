<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | Frankly.</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="../css/app.css">
</head>

<body style="justify-content: center; align-items: center; padding: 2rem;">

    <div class="card" style="max-width: 500px; width: 100%; text-align: center; padding: 3rem 2rem;">

        <div style="margin-bottom: 1.5rem;">
            <span
                style="background: rgba(59, 130, 246, 0.15); color: var(--brand-blue); padding: 0.25rem 0.75rem; border-radius: 999px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; border: 1px solid rgba(59, 130, 246, 0.3);">
                🔵 Demo Mode Active
            </span>
        </div>

        <h1 style="font-size: 2rem; font-weight: 800; margin-bottom: 1rem;">
            Welcome to <span
                style="background: linear-gradient(90deg, var(--brand-blue), var(--brand-emerald)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Frankly.</span>
        </h1>

        <p style="color: var(--text-muted); margin-bottom: 2rem; line-height: 1.6;">
            Your connection is secure. We are ready to pull your latest QuickBooks data and prepare your board's
            financial overview.
        </p>

        <a href="index.html" class="btn btn-primary"
            style="display: block; width: 100%; padding: 1rem; font-size: 1.125rem;">
            Go to Dashboard
        </a>
    </div>

    <script src="js/auth.js"></script>
</body>

</html>
