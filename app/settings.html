<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | Frankly.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="../css/app.css">
</head>

<body class="bg-slate-900 text-slate-50 font-sans antialiased flex min-h-screen">

    <aside class="w-64 border-r border-slate-800 bg-slate-950 p-6 hidden md:flex flex-col">
        <div class="text-xl font-bold tracking-tight mb-10">Frankly.</div>
        <nav class="flex-1 space-y-2 text-sm font-medium">
            <a href="index.html"
                class="flex items-center gap-3 px-3 py-2 rounded-md text-slate-400 hover:bg-slate-900 hover:text-white transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z">
                    </path>
                </svg>
                Dashboard
            </a>
            <a href="events.html"
                class="flex items-center gap-3 px-3 py-2 rounded-md text-slate-400 hover:bg-slate-900 hover:text-white transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z">
                    </path>
                </svg>
                Events
            </a>
            <a href="settings.html"
                class="flex items-center gap-3 px-3 py-2 rounded-md bg-blue-600/10 text-blue-500 transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z">
                    </path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                </svg>
                Settings
            </a>
        </nav>
        <button id="logout-btn" class="text-sm font-medium text-slate-500 hover:text-white transition text-left">
            Log Out
        </button>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        <header class="mb-10">
            <h1 class="text-3xl font-bold tracking-tight">Settings</h1>
            <p class="text-slate-400 text-sm mt-1">Manage your association's profile and integrations.</p>
        </header>

        <div class="max-w-3xl space-y-8">

            <section class="bg-slate-950 border border-slate-800 rounded-xl p-6">
                <div class="flex items-center justify-between mb-4">
                    <div>
                        <h2 class="text-lg font-bold">QuickBooks Online</h2>
                        <p class="text-sm text-slate-400">Sync your ledger directly to Frankly.</p>
                    </div>
                    <span
                        class="bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-3 py-1 rounded-full text-xs font-bold tracking-wide flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-emerald-500"></span> Connected
                    </span>
                </div>
                <div class="border-t border-slate-800 pt-4 mt-2">
                    <p class="text-sm text-slate-500 mb-4">Last synced: <span class="text-slate-300 font-medium">Today
                            at 9:42 AM</span></p>
                    <button
                        class="bg-slate-800 hover:bg-slate-700 text-white text-sm font-bold py-2 px-4 rounded-md transition">
                        Force Manual Sync
                    </button>
                    <button class="text-red-400 hover:text-red-300 text-sm font-medium ml-4 transition">
                        Disconnect
                    </button>
                </div>
            </section>

            <section class="bg-slate-950 border border-slate-800 rounded-xl p-6">
                <h2 class="text-lg font-bold mb-6">Association Details</h2>
                <form class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label
                                class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Organization
                                Name</label>
                            <input type="text"
                                class="w-full bg-slate-900 border border-slate-800 rounded-md px-4 py-2 text-sm focus:outline-none focus:border-blue-500 text-white"
                                value="Sample NFP Association">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Fiscal
                                Year End</label>
                            <select
                                class="w-full bg-slate-900 border border-slate-800 rounded-md px-4 py-2 text-sm focus:outline-none focus:border-blue-500 text-white appearance-none">
                                <option>December 31</option>
                                <option>June 30</option>
                                <option>September 30</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Brand Color
                            (Hex)</label>
                        <div class="flex items-center gap-3">
                            <input type="color" value="#3b82f6"
                                class="w-10 h-10 rounded cursor-pointer bg-transparent border-0 p-0">
                            <input type="text"
                                class="w-full bg-slate-900 border border-slate-800 rounded-md px-4 py-2 text-sm focus:outline-none focus:border-blue-500 text-white"
                                value="#3b82f6">
                        </div>
                        <p class="text-xs text-slate-500 mt-2">This color will be applied to your board's dashboard
                            charts.</p>
                    </div>
                    <div class="pt-4">
                        <button type="button"
                            class="bg-blue-600 hover:bg-blue-500 text-white text-sm font-bold py-2 px-6 rounded-md transition">
                            Save Changes
                        </button>
                    </div>
                </form>
            </section>

        </div>
    </main>

    <script src="js/auth.js"></script>
</body>

</html>
