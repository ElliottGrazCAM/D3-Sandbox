<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frankly | It's for non-profits.</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="styles.css">
</head>

<body class="flex flex-col min-h-screen">

    <nav class="max-w-7xl mx-auto px-6 py-8 w-full">
        <a href="index.html" class="text-2xl font-bold gradient-text">FINSIMPLE</a>
    </nav>

    <div class="flex-grow flex items-center justify-center px-6">
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-md">
            <h2 id="auth-title" class="text-3xl font-bold mb-2">Welcome Back</h2>
            <p id="auth-subtitle" class="text-slate-400 mb-8 text-sm">Log in to access your association dashboard.</p>

            <form id="auth-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">Email Address</label>
                    <input type="email" id="email" required
                        class="w-full bg-slate-950 border border-slate-800 rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500 transition text-white">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">Password</label>
                    <input type="password" id="password" required
                        class="w-full bg-slate-950 border border-slate-800 rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500 transition text-white">
                </div>

                <div id="error-msg" class="text-red-500 text-xs hidden"></div>

                <button type="submit" id="submit-btn"
                    class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg transition mt-4">
                    Sign In
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-slate-800 text-center">
                <p class="text-slate-400 text-sm">
                    <span id="toggle-text">Don't have an account?</span>
                    <button id="toggle-auth"
                        class="text-blue-500 font-bold hover:underline focus:outline-none ml-1">Sign Up</button>
                </p>
            </div>
        </div>
    </div>

    <script>
        // 1. INITIALIZE SUPABASE (Use your actual keys here)
        const SUPABASE_URL = 'https://yxmfcvuotkgmnyuewfyg.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl4bWZjdnVvdGtnbW55dWV3ZnlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3OTk5MjIsImV4cCI6MjA5MjM3NTkyMn0.RAXRy1QJI7Z2L6_lKFRJukJ5QZhCJY98ThH9OfjjuEQ';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const authForm = document.getElementById('auth-form');
        const authTitle = document.getElementById('auth-title');
        const authSubtitle = document.getElementById('auth-subtitle');
        const submitBtn = document.getElementById('submit-btn');
        const toggleBtn = document.getElementById('toggle-auth');
        const errorDiv = document.getElementById('error-msg');

        let isLogin = true;

        // Toggle between Login and Signup modes
        toggleBtn.addEventListener('click', () => {
            isLogin = !isLogin;
            authTitle.innerText = isLogin ? "Welcome Back" : "Create Account";
            authSubtitle.innerText = isLogin ? "Log in to access your association dashboard." : "Join FinSimple to automate your financial reporting.";
            submitBtn.innerText = isLogin ? "Sign In" : "Get Started";
            toggleBtn.innerText = isLogin ? "Sign Up" : "Sign In";
            document.getElementById('toggle-text').innerText = isLogin ? "Don't have an account?" : "Already have an account?";
            errorDiv.classList.add('hidden');
        });

        // Handle Form Submission
        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorDiv.classList.add('hidden');
            submitBtn.innerText = "Processing...";
            submitBtn.disabled = true;

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            let result;

            if (isLogin) {
                // SIGN IN
                result = await _supabase.auth.signInWithPassword({ email, password });
            } else {
                // SIGN UP
                result = await _supabase.auth.signUp({ email, password });
            }

            if (result.error) {
                errorDiv.innerText = result.error.message;
                errorDiv.classList.remove('hidden');
                submitBtn.innerText = isLogin ? "Sign In" : "Get Started";
                submitBtn.disabled = false;
            } else {
                // SUCCESS!
                if (!isLogin && result.data.user && result.data.session === null) {
                    alert("Check your email for a confirmation link!");
                    window.location.reload();
                } else {
                    // Redirect to the App
                    window.location.href = 'app/welcome.html';
                }
            }
        });
    </script>
</body>

</html>
