<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frankly | Log In</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="css/marketing.css">
</head>

<body>

    <nav class="container nav-bar">
        <a href="index.html" class="logo gradient-text">Frankly.</a>
    </nav>

    <div class="auth-wrapper">
        <div class="auth-box">
            <h2 id="auth-title" style="font-size: 1.875rem; font-weight: bold; margin-bottom: 0.5rem;">Welcome Back</h2>
            <p id="auth-subtitle" style="color: var(--text-muted); font-size: 0.875rem; margin-bottom: 2rem;">Log in to
                access your association dashboard.</p>

            <form id="auth-form">
                <div>
                    <label class="auth-label">Email Address</label>
                    <input type="email" id="email" required class="auth-input" placeholder="executive@association.org">
                </div>
                <div>
                    <label class="auth-label">Password</label>
                    <input type="password" id="password" required class="auth-input" placeholder="••••••••">
                </div>

                <div id="error-msg"
                    style="display: none; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #f87171; padding: 0.75rem; border-radius: 0.375rem; font-size: 0.875rem; margin-bottom: 1rem;">
                </div>

                <button type="submit" id="submit-btn" class="auth-btn">Sign In</button>
            </form>

            <div
                style="border-top: 1px solid #334155; margin-top: 2rem; padding-top: 1.5rem; text-align: center; font-size: 0.875rem;">
                <span id="toggle-text" style="color: var(--text-muted);">Don't have an account?</span>
                <button id="toggle-auth"
                    style="background: none; border: none; color: var(--brand-blue); font-weight: bold; cursor: pointer; margin-left: 0.5rem;">Sign
                    Up</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://yxmfcvuotkgmnyuewfyg.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl4bWZjdnVvdGtnbW55dWV3ZnlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3OTk5MjIsImV4cCI6MjA5MjM3NTkyMn0.RAXRy1QJI7Z2L6_lKFRJukJ5QZhCJY98ThH9OfjjuEQ';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const authForm = document.getElementById('auth-form');
        const authTitle = document.getElementById('auth-title');
        const authSubtitle = document.getElementById('auth-subtitle');
        const submitBtn = document.getElementById('submit-btn');
        const toggleBtn = document.getElementById('toggle-auth');
        const errorDiv = document.getElementById('error-msg');
        let isLogin = true;

        toggleBtn.addEventListener('click', () => {
            isLogin = !isLogin;
            authTitle.innerText = isLogin ? "Welcome Back" : "Create Account";
            authSubtitle.innerText = isLogin ? "Log in to access your association dashboard." : "Join Frankly. No clutter, just clarity.";
            submitBtn.innerText = isLogin ? "Sign In" : "Get Started";
            toggleBtn.innerText = isLogin ? "Sign Up" : "Sign In";
            document.getElementById('toggle-text').innerText = isLogin ? "Don't have an account?" : "Already have an account?";
            errorDiv.style.display = "none";
        });

        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorDiv.style.display = "none";
            submitBtn.innerText = "Processing...";
            submitBtn.disabled = true;

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            let result;

            if (isLogin) {
                result = await _supabase.auth.signInWithPassword({ email, password });
            } else {
                result = await _supabase.auth.signUp({ email, password });
            }

            if (result.error) {
                errorDiv.innerText = result.error.message;
                errorDiv.style.display = "block";
                submitBtn.innerText = isLogin ? "Sign In" : "Get Started";
                submitBtn.disabled = false;
            } else {
                if (!isLogin && result.data.user && result.data.session === null) {
                    alert("Check your email for a confirmation link!");
                    window.location.reload();
                } else {
                    window.location.href = 'app/welcome.html';
                }
            }
        });
    </script>
</body>

</html>
